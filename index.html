<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Landscape Cycling Cockpit</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --brand-color: #ff8d14;
            --bg-dark: #0a0a0a;
            --surface: #1a1a1a;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Portrait Warning */
        @media (orientation: portrait) {
            #portrait-overlay { display: flex; }
        }

        #portrait-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Landscape Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 60% 40%;
            width: 100%;
            height: 100%;
        }

        /* Left Section: Compass */
        .visual-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 2px solid var(--surface);
            position: relative;
        }

        #settingsBtn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: var(--brand-color);
            color: black;
            border: none;
            padding: 10px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #arrow {
            font-size: 25vh;
            color: var(--brand-color);
            transition: transform 0.1s linear;
            filter: drop-shadow(0 0 10px var(--brand-color));
        }

        .dest-label {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.7;
        }

        /* Right Section: Data Tiles */
        .data-sidebar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            background: var(--surface);
        }

        .tile {
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 15px;
        }

        .full-width { grid-column: span 2; }

        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.8rem; font-weight: 800; color: var(--brand-color); }
        .unit { font-size: 0.9rem; color: #555; }

        /* Controls */
        #start-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            background: var(--brand-color);
            color: black;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
        }

        .settings-pane {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1001;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .settings-content {
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .settings-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--brand-color);
            color: black;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 1rem;
        }

        input { background: #333; border: 1px solid #555; color: white; padding: 5px; margin: 5px 0; }

        /* iOS Style Switches */
        input[type="checkbox"] {
            appearance: none;
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
            margin-right: 10px;
        }

        input[type="checkbox"]:checked {
            background: var(--brand-color);
        }

        input[type="checkbox"]:before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }

        input[type="checkbox"]:checked:before {
            transform: translateX(24px);
        }
    </style>
</head>
<body>

    <div id="portrait-overlay">
        <h1>PLEASE ROTATE DEVICE</h1>
        <p>Landscape mode is required for the cockpit view.</p>
    </div>

    <div id="start-screen">
        <button onclick="initApp()">START TRACKING</button>
    </div>

    <div class="dashboard">
        <div class="visual-area">
            <div id="arrow">▲</div>
            <div class="dest-label">DIST TO GO: <span id="dist-to-go">0.0</span> km</div>
            <button id="settingsBtn" onclick="toggleSettings()">⚙</button>
        </div>

        <div class="data-sidebar">
            <div class="tile" id="speedTile">
                <span class="label">Speed</span>
                <div><span class="value" id="speed">0.0</span> <span class="unit">km/h</span></div>
            </div>
            <div class="tile" id="topSpeedTile">
                <span class="label">Top</span>
                <div><span class="value" id="top-speed">0.0</span> <span class="unit">km/h</span></div>
            </div>
            <div class="tile full-width" id="avgSpeedTile">
                <span class="label">Avg Speed</span>
                <div><span class="value" id="avg-speed">0.0</span> <span class="unit">km/h</span></div>
            </div>
            <div class="tile" id="distanceTile">
                <span class="label">Distance</span>
                <div><span class="value" id="distance">0.0</span> <span class="unit">km</span></div>
            </div>
            <div class="tile" id="timerTile">
                <span class="label">Time</span>
                <div><span class="value" id="timer">00:00:00</span></div>
            </div>
            <div class="tile full-width" id="elevationTile">
                <span class="label">Elevation</span>
                <div><span class="value" id="elevation">---</span> <span class="unit">m</span></div>
            </div>
        </div>
    </div>

    <div id="map-modal" style="display:none; position:fixed; inset:0; background:white; z-index:1000;">
        <div id="map" style="height:100%;"></div>
        <button onclick="closeMap()" style="position:absolute; top:10px; right:10px; background:black; color:white; border:none; padding:10px; border-radius:5px;">Close</button>
    </div>

    <div class="settings-pane" id="settingsPane">
        <div class="settings-content">
            <button class="settings-close" onclick="toggleSettings()">×</button>
            <div><strong>Settings</strong></div>
            Theme: <input type="color" id="colorPicker" value="#39FF14" onchange="updateTheme(this.value)"> <br>
            <button onclick="openMap()">Set Destination on Map</button> <br><br>
            <div><strong>Show Stats:</strong></div>
            <label><input type="checkbox" id="showSpeed" onchange="toggleStat('speed')"> Speed</label><br>
            <label><input type="checkbox" id="showTopSpeed" onchange="toggleStat('topSpeed')"> Top Speed</label><br>
            <label><input type="checkbox" id="showAvgSpeed" onchange="toggleStat('avgSpeed')"> Avg Speed</label><br>
            <label><input type="checkbox" id="showDistance" onchange="toggleStat('distance')"> Distance</label><br>
            <label><input type="checkbox" id="showTimer" onchange="toggleStat('timer')"> Time</label><br>
            <label><input type="checkbox" id="showElevation" onchange="toggleStat('elevation')"> Elevation</label>
        </div>
    </div>

    <script>
        let settings = {
            color: '#39FF14',
            tLat: 0.0,
            tLon: 0.0,
            visibleStats: {
                speed: true,
                topSpeed: true,
                avgSpeed: true,
                distance: true,
                timer: true,
                elevation: true
            }
        };

        let startTime, timerInterval;
        let totalDist = 0, topSpeed = 0, lastPos = null;
        let smoothedHeading = 0;
        const alpha = 0.15; // Compass smoothing
        let map, currentMarker, destMarker;

        function loadSettings() {
            const saved = localStorage.getItem('cockpitSettings');
            if (saved) {
                settings = JSON.parse(saved);
                updateTheme(settings.color);
                document.getElementById('colorPicker').value = settings.color;
                applyStatVisibility();
            }
        }

        function saveSettings() {
            localStorage.setItem('cockpitSettings', JSON.stringify(settings));
        }

        function updateTheme(color) {
            settings.color = color;
            document.documentElement.style.setProperty('--brand-color', color);
            saveSettings();
        }

        function toggleStat(stat) {
            settings.visibleStats[stat] = !settings.visibleStats[stat];
            applyStatVisibility();
            saveSettings();
        }

        function applyStatVisibility() {
            document.getElementById('speedTile').style.display = settings.visibleStats.speed ? 'flex' : 'none';
            document.getElementById('topSpeedTile').style.display = settings.visibleStats.topSpeed ? 'flex' : 'none';
            document.getElementById('avgSpeedTile').style.display = settings.visibleStats.avgSpeed ? 'flex' : 'none';
            document.getElementById('distanceTile').style.display = settings.visibleStats.distance ? 'flex' : 'none';
            document.getElementById('timerTile').style.display = settings.visibleStats.timer ? 'flex' : 'none';
            document.getElementById('elevationTile').style.display = settings.visibleStats.elevation ? 'flex' : 'none';
        }

        function toggleSettings() {
            const pane = document.getElementById('settingsPane');
            pane.style.display = pane.style.display === 'none' ? 'flex' : 'none';
        }

        function openMap() {
            if (!lastPos) return;
            document.getElementById('map-modal').style.display = 'block';
            if (!map) {
                map = L.map('map').setView([lastPos.lat, lastPos.lon], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
                currentMarker = L.marker([lastPos.lat, lastPos.lon]).addTo(map).bindPopup('You are here');
                const tLat = settings.tLat;
                const tLon = settings.tLon;
                if (tLat != 0 || tLon != 0) {
                    destMarker = L.marker([tLat, tLon]).addTo(map).bindPopup('Destination');
                }
                map.on('click', function(e) {
                    if (destMarker) map.removeLayer(destMarker);
                    destMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map).bindPopup('Destination');
                    settings.tLat = parseFloat(e.latlng.lat.toFixed(4));
                    settings.tLon = parseFloat(e.latlng.lng.toFixed(4));
                    saveSettings();
                });
            } else {
                map.setView([lastPos.lat, lastPos.lon], 13);
                currentMarker.setLatLng([lastPos.lat, lastPos.lon]);
            }
        }

        function closeMap() {
            document.getElementById('map-modal').style.display = 'none';
        }

        function initApp() {
            loadSettings();
            document.getElementById('showSpeed').checked = settings.visibleStats.speed;
            document.getElementById('showTopSpeed').checked = settings.visibleStats.topSpeed;
            document.getElementById('showAvgSpeed').checked = settings.visibleStats.avgSpeed;
            document.getElementById('showDistance').checked = settings.visibleStats.distance;
            document.getElementById('showTimer').checked = settings.visibleStats.timer;
            document.getElementById('showElevation').checked = settings.visibleStats.elevation;
            document.getElementById('start-screen').style.display = 'none';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            startTime = Date.now();
            
            // 1. Request GPS
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updatePosition, null, {
                    enableHighAccuracy: true
                });
            }

            // 2. Request Compass (iOS Special Handling)
        // Force absolute orientation for Android
if ('ondeviceorientationabsolute' in window) {
    window.addEventListener('deviceorientationabsolute', updateBearing);
} else {
    window.addEventListener('deviceorientation', updateBearing);
}

            // 3. Start Timer
            timerInterval = setInterval(updateTimer, 1000);

            // 4. Wake Lock (Keep screen on)
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
        }

        function updatePosition(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const speedKmH = (pos.coords.speed || 0) * 3.6;

            // Speed logic
            if (speedKmH > topSpeed) topSpeed = speedKmH;
            document.getElementById('speed').innerText = speedKmH.toFixed(1);
            document.getElementById('top-speed').innerText = topSpeed.toFixed(1);
            document.getElementById('elevation').innerText = pos.coords.altitude ? pos.coords.altitude.toFixed(0) : "---";

            // Distance Logic
            if (lastPos) {
                const d = haversine(lastPos.lat, lastPos.lon, lat, lon);
                totalDist += d;
                document.getElementById('distance').innerText = totalDist.toFixed(2);
            }
            lastPos = {lat, lon};

            // Distance to Target
            const distToGoal = haversine(lat, lon, settings.tLat, settings.tLon);
            document.getElementById('dist-to-go').innerText = distToGoal.toFixed(2);

            // Update map marker if map is open
            if (currentMarker) currentMarker.setLatLng([lat, lon]);
        }

    function updateBearing(e) {
    // Use webkitCompassHeading for iOS, alpha for Android
    let heading = e.webkitCompassHeading || e.alpha;
    if (heading === undefined || heading === null) return;

    // IMPORTANT: Android alpha is often counter-clockwise. 
    // We may need to invert it depending on the browser version.
    if (!e.webkitCompassHeading) {
        heading = 360 - heading; 
    }

    // Low-pass filter (Smoothing)
    smoothedHeading = (alpha * heading) + (1 - alpha) * smoothedHeading;

    const tLat = settings.tLat;
    const tLon = settings.tLon;

    if (lastPos && tLat != 0) {
        const targetBearing = getBearing(lastPos.lat, lastPos.lon, tLat, tLon);
        
        // This is the magic "locked" math
        let arrowRotation = targetBearing - smoothedHeading;

        // Force the rotation to take the shortest path (prevents spinning 350 degrees)
        while (arrowRotation < -180) arrowRotation += 360;
        while (arrowRotation > 180) arrowRotation -= 360;

        document.getElementById('arrow').style.transform = `rotate(${arrowRotation}deg)`;
    }
}

        function getBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371; // km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function updateTimer() {
            const sec = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').innerText = new Date(sec * 1000).toISOString().substr(11, 8);
            
            if (totalDist > 0) {
                const hours = sec / 3600;
                document.getElementById('avg-speed').innerText = (totalDist / hours).toFixed(1);
            }
        }

        window.addEventListener('load', loadSettings);
    </script>
</body>
</html>
